<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Qotixo{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --amber: #E8A020;
            --amber-deep: #B97A12;
            --amber-soft: #FCEFD6;
            --dark: #1A1714;
            --ink: #4A453E;
            --cream: #F5F2ED;
            --line: #E6DFD1;
            --success: #2F7D32;
            --success-soft: #E4F2E4;
            --danger: #B33A3A;
            --danger-soft: #FBEAE8;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 28px 20px 64px;
        }
        h1, h2 {
            color: var(--dark);
            margin-top: 0;
            font-weight: 800;
            letter-spacing: -0.01em;
        }
        h1 {
            font-size: 26px;
            padding-bottom: 16px;
            margin-bottom: 22px;
            position: relative;
        }
        /* Divisor "agregado" — guiño al concreto, no una linea plana */
        h1::after {
            content: "";
            position: absolute;
            left: 0; bottom: 0;
            width: 100%; height: 4px;
            background-image:
                radial-gradient(circle at 6px 2px, var(--amber-deep) 1.4px, transparent 1.6px),
                linear-gradient(to right, var(--amber), var(--amber));
            background-size: 14px 4px, 100% 2px;
            background-position: 0 0, 0 100%;
            background-repeat: repeat-x, no-repeat;
        }
        h2 { font-size: 17px; margin-bottom: 10px; }
        p { color: var(--ink); }
        label { font-weight: 700; font-size: 13px; display: block; margin: 16px 0 6px; color: var(--ink); text-transform: uppercase; letter-spacing: 0.02em; }
        input, select, textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            background: white;
            color: var(--dark);
            transition: border-color .15s ease, box-shadow .15s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--amber);
            box-shadow: 0 0 0 3px var(--amber-soft);
        }
        button, .btn {
            background-color: var(--amber);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            margin-top: 18px;
            display: block;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 4px 12px -4px rgba(232,160,32,0.55);
            transition: transform .1s ease, box-shadow .15s ease, background-color .15s ease;
        }
        button:hover, .btn:hover { background-color: var(--amber-deep); }
        button:active, .btn:active { transform: translateY(1px); box-shadow: 0 2px 6px -2px rgba(232,160,32,0.5); }
        button:focus-visible, .btn:focus-visible { outline: 2px solid var(--dark); outline-offset: 2px; }
        .btn-dark { background-color: var(--dark); box-shadow: 0 4px 12px -4px rgba(26,23,20,0.45); }
        .btn-dark:hover { background-color: #0E0C0A; }
        .btn-outline { background: white; color: var(--dark); border: 1.5px solid var(--line); box-shadow: none; }
        .btn-outline:hover { background-color: var(--cream); }
        .link-row { text-align: center; margin-top: 20px; }
        .link-row a { color: var(--ink); text-decoration: none; font-size: 14px; font-weight: 600; display: block; margin-top: 10px; }
        .link-row a:hover { color: var(--dark); }
        .link-danger { color: var(--danger) !important; }
        .card {
            background: white;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 1px 2px rgba(26,23,20,0.04), 0 8px 24px -12px rgba(26,23,20,0.14);
            margin-top: 18px;
        }
        .alert {
            background: var(--danger-soft);
            color: var(--danger);
            padding: 13px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .alert-success {
            background: var(--success-soft);
            color: var(--success);
        }
        .amount {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 2px rgba(26,23,20,0.04), 0 8px 24px -12px rgba(26,23,20,0.14); }
        th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13.5px; }
        tr:last-child td { border-bottom: none; }
        th { background-color: var(--dark); color: white; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
