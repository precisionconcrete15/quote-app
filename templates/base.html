<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Qotixo{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --amber: #E8A020;
            --amber-deep: #B97A12;
            --amber-soft: #FCEFD6;
            --dark: #1A1714;
            --ink: #4A453E;
            --faint: #8A8175;
            --cream: #F5F2ED;
            --line: #E6DFD1;
            --success: #2F7D32;
            --success-soft: #E4F2E4;
            --danger: #B33A3A;
            --danger-soft: #FBEAE8;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --shadow-1: 0 1px 2px rgba(26,23,20,0.05);
            --shadow-2: 0 1px 2px rgba(26,23,20,0.04), 0 8px 24px -12px rgba(26,23,20,0.16);
            --shadow-3: 0 4px 16px -6px rgba(26,23,20,0.18), 0 12px 32px -14px rgba(26,23,20,0.16);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- App bar ---------- */
        .appbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 480px;
            margin: 0 auto;
            padding: 18px 20px 0;
        }
        .brandmark {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brandmark .badge {
            width: 30px; height: 30px;
            border-radius: 9px;
            background: linear-gradient(155deg, var(--amber), var(--amber-deep));
            color: white;
            font-weight: 800;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px -3px rgba(232,160,32,0.6);
            font-family: 'JetBrains Mono', monospace;
        }
        .brandmark span {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.06em;
            color: var(--faint);
            text-transform: uppercase;
        }
        .icon-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            text-decoration: none;
            transition: background-color .15s ease;
        }
        .icon-btn:hover { background: white; }
        .icon-btn svg { width: 18px; height: 18px; }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 20px 100px;
        }
        h1, h2 {
            color: var(--dark);
            margin-top: 0;
            font-weight: 800;
            letter-spacing: -0.01em;
        }
        h1 {
            font-size: 25px;
            padding-bottom: 15px;
            margin-bottom: 22px;
            position: relative;
        }
        h1::after {
            content: "";
            position: absolute;
            left: 0; bottom: 0;
            width: 100%; height: 4px;
            background-image:
                radial-gradient(circle at 6px 2px, var(--amber-deep) 1.4px, transparent 1.6px),
                linear-gradient(to right, var(--amber), var(--amber));
            background-size: 14px 4px, 100% 2px;
            background-position: 0 0, 0 100%;
            background-repeat: repeat-x, no-repeat;
        }
        h2 { font-size: 17px; margin-bottom: 10px; }
        p { color: var(--ink); }
        label { font-weight: 700; font-size: 12.5px; display: block; margin: 16px 0 6px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.04em; }
        input, select, textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1.5px solid var(--line);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-family: inherit;
            background: white;
            color: var(--dark);
            transition: border-color .15s ease, box-shadow .15s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--amber);
            box-shadow: 0 0 0 3px var(--amber-soft);
        }
        button, .btn {
            background-color: var(--amber);
            color: white;
            padding: 15px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            margin-top: 18px;
            display: block;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 6px 16px -6px rgba(232,160,32,0.55);
            transition: transform .1s ease, box-shadow .15s ease, background-color .15s ease, filter .15s ease;
        }
        button:hover, .btn:hover { filter: brightness(1.04); }
        button:active, .btn:active { transform: translateY(1px) scale(0.995); box-shadow: 0 2px 6px -2px rgba(232,160,32,0.5); }
        button:focus-visible, .btn:focus-visible { outline: 2px solid var(--dark); outline-offset: 2px; }
        .btn-dark { background-color: var(--dark); box-shadow: 0 6px 16px -6px rgba(26,23,20,0.45); }
        .btn-outline { background: white; color: var(--dark); border: 1.5px solid var(--line); box-shadow: none; }
        .btn-outline:hover { background-color: var(--cream); filter: none; }
        .link-row { text-align: center; margin-top: 20px; }
        .link-row a { color: var(--ink); text-decoration: none; font-size: 14px; font-weight: 600; display: block; margin-top: 10px; }
        .link-row a:hover { color: var(--dark); }
        .link-danger { color: var(--danger) !important; }
        .card {
            background: white;
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 22px;
            box-shadow: var(--shadow-2);
            margin-top: 18px;
            animation: rise .35s ease both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .alert {
            background: var(--danger-soft);
            color: var(--danger);
            padding: 13px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .alert-success { background: var(--success-soft); color: var(--success); }
        .amount { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-variant-numeric: tabular-nums; }

        /* ---------- Status pills ---------- */
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            padding: 5px 10px;
            border-radius: 999px;
        }
        .pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .pill-amber { background: var(--amber-soft); color: var(--amber-deep); }
        .pill-success { background: var(--success-soft); color: var(--success); }
        .pill-neutral { background: var(--line); color: var(--ink); }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-2); }
        th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13.5px; }
        tr:last-child td { border-bottom: none; }
        th { background-color: var(--dark); color: white; font-weight: 700; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.03em; }

        /* ---------- Bottom nav ---------- */
        .bottomnav {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(14px) saturate(1.4);
            -webkit-backdrop-filter: blur(14px) saturate(1.4);
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: space-around;
            padding: 10px 6px calc(10px + env(safe-area-inset-bottom));
            z-index: 20;
        }
        .navitem {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--faint);
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            width: 62px;
            padding: 4px 0;
        }
        .navitem svg { width: 21px; height: 21px; stroke-width: 2; }
        .navitem.active { color: var(--amber-deep); }
        .navitem.active svg { stroke: var(--amber-deep); }
    </style>
</head>
<body>
    {% if active_nav %}
    <div class="appbar">
        <div class="brandmark">
            <div class="badge">Q</div>
            <span>{{ company_name or "Qotixo" }}</span>
        </div>
        <a href="/logout" class="icon-btn" aria-label="Logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </a>
    </div>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% if active_nav %}
    <nav class="bottomnav">
        <a href="/" class="navitem {% if active_nav=='home' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
        </a>
        <a href="/quotes" class="navitem {% if active_nav=='quotes' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
            Quotes
        </a>
        <a href="/dashboard" class="navitem {% if active_nav=='dashboard' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Stats
        </a>
        <a href="/services" class="navitem {% if active_nav=='services' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            Services
        </a>
        <a href="/settings" class="navitem {% if active_nav=='settings' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
        </a>
    </nav>
    {% endif %}
</body>
</html>
