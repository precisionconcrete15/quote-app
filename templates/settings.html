{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<h1>Settings</h1>
<form method="POST" action="/settings">
    <label>Company Name</label>
    <input type="text" name="company_name" value="{{ company_name }}" required>
    <label>Driveway price per sqft ($)</label>
    <input type="number" step="0.01" name="price_driveway" value="{{ price_driveway }}" required>
    <label>Patio price per sqft ($)</label>
    <input type="number" step="0.01" name="price_patio" value="{{ price_patio }}" required>
    <label>Foundation price per sqft ($)</label>
    <input type="number" step="0.01" name="price_foundation" value="{{ price_foundation }}" required>
    <label>Demo upcharge per sqft ($)</label>
    <input type="number" step="0.01" name="demo_upcharge" value="{{ demo_upcharge }}" required>
    <button type="submit">Save</button>
</form>
<div class="link-row">
    <a href="/">Back to Home</a>
</div>
{% endblock %}
